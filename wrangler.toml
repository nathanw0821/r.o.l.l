EMAIL_FROM = "R.O.L.L <no-reply@support.fallout76.wiki>"
GOOGLE_CLIENT_ID = "717058834888-tri1suu3o125h1haajjrffufioj75ga7.apps.googleusercontent.com"

[triggers]
crons = ["0 18 * * *"]

