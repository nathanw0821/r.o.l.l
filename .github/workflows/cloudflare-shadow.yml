name: Cloudflare Shadow Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.DATABASE_URL_PLACEHOLDER }}

      - name: Build Next.js with OpenNext
        run: npm run build:cf
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.DATABASE_URL_PLACEHOLDER }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://fallout76.wiki

      - name: Output Bundle and Asset Sizes
        run: |
          echo "=== Standalone Server Bundle and WASM Files ==="
          ls -lh .open-next/ || true
          find .open-next/server-functions/default -type f -exec ls -lh {} + | sort -k 5 -h || true
          echo "=== Assets Size ==="
          du -sh .open-next/assets || true

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --minify

      - name: Upload Wrangler Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-logs
          path: .wrangler/logs/
